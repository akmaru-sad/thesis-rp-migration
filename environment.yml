name: thesis-rp
channels:
  - conda-forge
  - nodefaults
dependencies:
  # Python runtime
  - python=3.11

  # Core geo stack
  - gdal>=3.8
  - rasterio>=1.3
  - rioxarray>=0.15
  - geopandas>=0.14
  - shapely>=2.0
  - pyproj>=3.6
  - fiona>=1.9

  # Array + scientific computing
  - numpy>=1.26,<2.0
  - pandas>=2.2
  - scipy>=1.13
  - xarray>=2024.6
  - dask>=2024.6
  - bottleneck
  - numba

  # NetCDF / climate I/O
  - netcdf4>=1.6
  - cftime
  - nc-time-axis
  - h5netcdf

  # Regridding (Linux-only; we are on WSL2)
  - xesmf>=0.8
  - esmpy>=8.6

  # Bias correction
  - xclim>=0.50

  # GEE
  - earthengine-api>=0.1.400
  - geemap>=0.32

  # CMIP6 / ESGF
  - intake-esm>=2024.2
  - intake>=0.7
  - aiohttp

  # ERA5 acquisition
  - cdsapi>=0.7

  # Stats
  - statsmodels>=0.14
  - scikit-image>=0.22
  - scikit-learn>=1.4

  # Plotting
  - matplotlib>=3.8
  - seaborn>=0.13
  - plotly>=5.20

  # I/O
  - pyarrow>=15
  - openpyxl>=3.1
  - xlrd>=2.0
  - tqdm

  # Notebooks
  - jupyterlab>=4.1
  - ipywidgets
  - ipykernel

  # Dev tooling
  - black>=24.3
  - isort>=5.13
  - nbstripout>=0.7
  - pre-commit>=3.7
  - pytest>=8.0
  - python-dotenv>=1.0

  # pip layer for fast-moving Python-pure libs
  - pip
  - pip:
    - -r requirements.txt
